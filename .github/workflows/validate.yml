name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Static validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        run: npm run check

      - name: Validate Foundry system data
        run: npm run validate

      - name: Run Node test harness
        run: npm test
